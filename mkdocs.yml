site_name: SOCA Platform Documentation
site_description: Online guidance for the SOCA platform, including architecture, deployment, operations, and reference material.
site_url: https://irpus1603.github.io/soca-documentation
repo_name: soca-documentation
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.collapse
    - navigation.top
    - navigation.prune
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md

  - Getting Started:
      - Repository Overview: repository-overview.md
      - Full Setup Guide: SETUP.md
      - Deployment Paths: guides/deployment-paths.md
      - Deploy This Docs Site: guides/docs-deployment.md

  - Product:
      - Use Cases: overview/product-offering-usecases.md

  - Architecture:
      - System Overview: architecture/system-overview.md

  - Deployment:
      - Infrastructure:
          - Docker: deployment/docker-deployment.md
          - Bare Metal RHEL: deployment/bare-metal-rhel-guide.md
          - GCP Cloud Run: deployment/gcp-cloud-run-guide.md
      - Integrations:
          - Pub/Sub Setup: deployment/pubsub-setup-guide.md
          - GCS Snapshot Storage: deployment/gcs-snapshot-storage.md
      - Reporting:
          - Metabase: deployment/metabase-reporting-guide.md
          - Grafana: deployment/grafana-reporting-guide.md
      - Security:
          - Cython Protection: deployment/cython-protection-guide.md

  - User Guides:
      - Overview: guides/user-guides.md
      - SOCA Dashboard (Edge):
          - User Guide: guides/user-guides.md
          - Design Spec: soca-dashboard/design-spec.md
          - Edge Operations Plan: soca-dashboard/edge-operations-plan.md
          - Edge Operations Design: soca-dashboard/edge-operations-design.md
          - Rule Management Plan: soca-dashboard/rule-management-plan.md
          - Advanced Rule Management: soca-dashboard/advanced-rule-management-design.md
      - SOCA Control (Fleet):
          - User Guide: guides/soca-control-user-guide.md
          - Design Spec: soca-control/design-spec.md
          - Edge Operations Plan: soca-control/edge-operations-plan.md
          - Implementation Plan: soca-control/implementation-plan.md
          - Pub/Sub Transport: soca-control/pubsub-transport-plan.md

  - Engine & Services:
      - Engine:
          - API Testing: soca-engine/api-testing.md
          - Object Detection Processor: soca-engine/object-detection-processor.md
          - Rule Management: soca-engine/rule-management-plan.md
      - Service:
          - Service Overview: soca-service/overview.md

